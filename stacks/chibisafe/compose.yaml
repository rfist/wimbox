services:
  chibisafe:
    image: chibisafe/chibisafe:latest
    container_name: chibisafe
    environment:
      - BASE_API_URL=http://chibisafe_server:8000
    expose:
      - 8001
    restart: unless-stopped
    depends_on:
      - chibisafe_server
    networks:
      - traefik

  chibisafe_server:
    image: chibisafe/chibisafe-server:latest
    container_name: chibisafe_server
    environment:
      - ADMIN_PASSWORD=${CHIBISAFE_ADMIN_PASSWORD:-admin}
    volumes:
      - ${MEDIA_ROOT}/chibisafe/database:/app/database:rw
      - ${MEDIA_ROOT}/chibisafe/uploads:/app/uploads:rw
      - ${APPDATA_ROOT}/chibisafe/logs:/app/logs:rw
    expose:
      - 8000
    restart: unless-stopped
    labels:
      - diun.enable=true
    networks:
      - traefik

  chibisafe_caddy:
    image: caddy:2-alpine
    container_name: chibisafe_caddy
    volumes:
      - ${MEDIA_ROOT}/chibisafe/uploads:/app/uploads:ro
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    expose:
      - 80
    restart: unless-stopped
    depends_on:
      - chibisafe
      - chibisafe_server
    labels:
      - traefik.enable=true
      - traefik.http.routers.chibisafe.rule=Host(`chibisafe.${BASE_DOMAIN}`)
      - traefik.http.routers.chibisafe.entrypoints=web
      - traefik.http.services.chibisafe.loadbalancer.server.port=80
      - diun.enable=true
    networks:
      - traefik

configs:
  caddyfile:
    content: |
      :80 {
          route {
              file_server * {
                  root /app/uploads
                  pass_thru
              }
              reverse_proxy /api/* http://chibisafe_server:8000
              reverse_proxy /docs* http://chibisafe_server:8000
              reverse_proxy * http://chibisafe:8001
          }
      }

networks:
  traefik:
    external: true
